defaults:
  - model: sd2_inpaint
  - sampler: baseline
  - data: local_images
  - hydra: default
  - _self_

device: cuda
dtype: bf16

run:
  seed: 42
  num_inference_steps: 50
  guidance_scale: 1.0  # 7.5
  prompt: ""  # or "realistic photo"
  negative_prompt: ""  # or "blurry, artifacts"
  height: 512
  width: 512
  compile_unet: false

